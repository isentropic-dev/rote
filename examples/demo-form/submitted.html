<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>rote demo submitted</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6fff8;
        color: #14301f;
      }

      main {
        max-width: 36rem;
        margin: 4rem auto;
        padding: 2rem;
        background: white;
        border: 1px solid #cfe9d7;
        border-radius: 16px;
        box-shadow: 0 12px 32px rgba(20, 48, 31, 0.08);
      }

      h1 {
        margin-top: 0;
      }

      a {
        color: #166534;
        font-weight: 600;
      }

      .submitted-values {
        margin: 1.5rem 0;
        padding: 1rem;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 10px;
        font-size: 0.95rem;
      }

      .submitted-values dt {
        font-weight: 600;
        margin-top: 0.5rem;
      }

      .submitted-values dt:first-child {
        margin-top: 0;
      }

      .submitted-values dd {
        margin-left: 1rem;
        color: #374151;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Submission received</h1>
      <div id="values" class="submitted-values"></div>
      <p><a href="index.html">Fill out another row</a></p>
    </main>

    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var row = {};
        var labels = {
          firstName: "First name",
          lastName: "Last name",
          email: "Email",
          company: "Company",
          plan: "Plan",
          favoriteColor: "Favorite color",
          notes: "Notes"
        };

        // Build the row object and display it.
        var dl = document.createElement("dl");
        params.forEach(function (value, key) {
          row[key] = value;
          var dt = document.createElement("dt");
          dt.textContent = labels[key] || key;
          var dd = document.createElement("dd");
          dd.textContent = value || "(empty)";
          dl.appendChild(dt);
          dl.appendChild(dd);
        });
        document.getElementById("values").appendChild(dl);

        // Save to localStorage.
        var stored = [];
        try {
          stored = JSON.parse(localStorage.getItem("rote-demo-submissions") || "[]");
        } catch (e) {
          stored = [];
        }
        stored.push(row);
        localStorage.setItem("rote-demo-submissions", JSON.stringify(stored));
      })();
    </script>
  </body>
</html>
