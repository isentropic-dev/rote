<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>rote demo form</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        background: #f4f7fb;
        color: #162033;
      }

      main {
        max-width: 42rem;
        margin: 3rem auto;
        padding: 2rem;
        background: white;
        border: 1px solid #d9e2f2;
        border-radius: 16px;
        box-shadow: 0 12px 32px rgba(22, 32, 51, 0.08);
      }

      h1 {
        margin-top: 0;
        margin-bottom: 0.5rem;
        font-size: 1.75rem;
      }

      p {
        margin-top: 0;
        color: #52607a;
      }

      form {
        display: grid;
        gap: 1rem;
      }

      .two-up {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      label {
        display: grid;
        gap: 0.4rem;
        font-weight: 600;
      }

      input,
      select,
      textarea,
      button {
        font: inherit;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 0.75rem 0.9rem;
        border: 1px solid #c2cde0;
        border-radius: 10px;
        box-sizing: border-box;
        background: white;
      }

      textarea {
        min-height: 7rem;
        resize: vertical;
      }

      .actions {
        display: flex;
        justify-content: flex-end;
      }

      button {
        padding: 0.8rem 1.2rem;
        border: 0;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        font-weight: 700;
        cursor: pointer;
      }

      .note {
        margin-top: 1rem;
        font-size: 0.9rem;
        color: #607089;
      }

      @media (max-width: 640px) {
        main {
          margin: 1rem;
          padding: 1.25rem;
        }

        .two-up {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>rote demo form</h1>
      <p>Use this page for manual training and playback tests. It works directly from disk — no local server needed.</p>

      <form action="submitted.html" method="get">
        <div class="two-up">
          <label>
            First name
            <input id="first-name" name="firstName" autocomplete="off">
          </label>

          <label>
            Last name
            <input id="last-name" name="lastName" autocomplete="off">
          </label>
        </div>

        <div class="two-up">
          <label>
            Email
            <input id="email" name="email" type="email" autocomplete="off">
          </label>

          <label>
            Company
            <input id="company" name="company" autocomplete="off">
          </label>
        </div>

        <div class="two-up">
          <label>
            Plan
            <select id="plan" name="plan">
              <option value="">Choose a plan</option>
              <option>Starter</option>
              <option>Growth</option>
              <option>Enterprise</option>
            </select>
          </label>

          <label>
            Favorite color
            <input id="favorite-color" name="favoriteColor" autocomplete="off">
          </label>
        </div>

        <label>
          Notes
          <textarea id="notes" name="notes"></textarea>
        </label>

        <div class="actions">
          <button id="submit" type="submit">Submit demo form</button>
        </div>
      </form>

      <p class="note">Tip: pair this with tabular data containing first name, last name, email, company, plan, favorite color, and notes.</p>
    </main>
  </body>
</html>
